# Default configuration for blind/shop joint training.

[general]
training_mode = "blind_shop"

[ray]
ignore_reinit_error = true

[run]
name = "blind_shop"
storage_path = "run_data"
trial_name_format = "{run_name}_{trial_id}"
# num_samples = 1

# Default stop condition is intentionally empty -- override as needed.
[run.stop]


[checkpoint]
num_to_keep = 10
checkpoint_frequency = 10

[wandb]
enabled = true
project = "balatro-rl"
log_config = true
save_checkpoints = false
# entity = ""
# group = ""

[parameters]
blind_action_dist = "ar_custom_dist"

[blind_env]
objective_mode = "blind_grind"
cannot_discard_obs = true
subset_hand_types_obs = false
scoring_cards_mask_obs = false
joker_count_range = [0, 0]
hand_level_range = [1, 1]
round_range = [1, 1]

[blind_shop_env]
start_phase = "blind"
shop_starts_enabled = true
cycle_blind_agents = true
truncate_blind_agents = false
catchup_probability = 0.0

[blind_model.custom_model_config]
action_method = "autoregressive"

[ppo_overrides.blind_shop.env_runners]
num_env_runners = 18
num_envs_per_env_runner = 20
sample_timeout_s = 180

[ppo_overrides.blind_shop.training]
train_batch_size = 131072
sgd_minibatch_size = 4096
num_sgd_iter = 5
lr = 0.00005